name: desktop

# Signed desktop builds + auto-update manifest.
#
# On a version tag (v*) this builds the Linux AppImage and the Windows installers,
# signs them with the Tauri updater key, attaches the binaries to the GitHub Release,
# and publishes a merged latest.json so the in-app updater can find new versions.
# Manual runs (workflow_dispatch) build + sign but don't touch a release.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of the minisign private key file
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password (empty string if none)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev patchelf file wget
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - run: npm ci

      - name: Build & sign AppImage
        run: npm run tauri:build -- --bundles appimage

      # Repack changes the AppImage, so its signature is now stale — re-sign it.
      - name: Repack (use system libwayland) and re-sign
        run: |
          bash scripts/repack-appimage-no-wayland.sh
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          npx tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$APPIMAGE"

      - name: Build updater manifest fragment
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          BASE=$(basename "$APPIMAGE")
          mkdir -p fragments
          SIG_PATH="$APPIMAGE.sig" \
          PLATFORM_KEY="linux-x86_64" \
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${BASE}" \
          OUT="fragments/linux.json" \
          node -e "const fs=require('fs');const out={[process.env.PLATFORM_KEY]:{signature:fs.readFileSync(process.env.SIG_PATH,'utf8'),url:process.env.ASSET_URL}};fs.writeFileSync(process.env.OUT,JSON.stringify(out))"

      - name: Upload manifest fragment
        uses: actions/upload-artifact@v4
        with:
          name: fragment-linux
          path: fragments/linux.json
          if-no-files-found: error

      - name: Attach AppImage to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage

  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Use HTTPS for GitHub git dependencies
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - run: npm ci

      - name: Build & sign Windows installers
        run: npm run tauri:build

      - name: Build updater manifest fragment
        shell: bash
        run: |
          EXE=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          BASE=$(basename "$EXE")
          mkdir -p fragments
          SIG_PATH="$EXE.sig" \
          PLATFORM_KEY="windows-x86_64" \
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${BASE}" \
          OUT="fragments/windows.json" \
          node -e "const fs=require('fs');const out={[process.env.PLATFORM_KEY]:{signature:fs.readFileSync(process.env.SIG_PATH,'utf8'),url:process.env.ASSET_URL}};fs.writeFileSync(process.env.OUT,JSON.stringify(out))"

      - name: Upload manifest fragment
        uses: actions/upload-artifact@v4
        with:
          name: fragment-windows
          path: fragments/windows.json
          if-no-files-found: error

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi

  manifest:
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: fragments
          pattern: fragment-*
          merge-multiple: true

      - name: Assemble latest.json
        run: |
          # Tags may be v1.0.2 or v.1.0.2 — strip the leading "v" and optional dot.
          VERSION=$(echo "$GITHUB_REF_NAME" | sed -E 's/^v\.?//')
          VERSION="$VERSION" node -e "
            const fs=require('fs');
            const platforms=Object.assign({},
              ...fs.readdirSync('fragments').filter(f=>f.endsWith('.json')).map(f=>JSON.parse(fs.readFileSync('fragments/'+f,'utf8'))));
            const out={version:process.env.VERSION,notes:'See the release notes.',pub_date:new Date().toISOString(),platforms};
            fs.writeFileSync('latest.json',JSON.stringify(out,null,2));
            console.log(JSON.stringify(out,null,2));
          "

      - name: Attach latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
