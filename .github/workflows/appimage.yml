name: appimage

# Linux AppImage — heavy (Rust compile), so it does NOT run on every push. It builds
# on version tags (v*) or when started manually from the Actions tab.
#
# Built natively on ubuntu-22.04 (glibc 2.35) for broad portability. For a build that
# also runs on even older distros, use the containerized scripts/build-appimage.sh
# locally (Ubuntu 24.04 image).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  appimage:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # linuxdeploy/appimagetool run without FUSE on CI runners.
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev patchelf file wget

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Use HTTPS for GitHub git dependencies
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run tauri:build -- --bundles appimage

      - name: Repack (use system libwayland)
        run: bash scripts/repack-appimage-no-wayland.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackbox-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
