name: windows

# Windows desktop installers (NSIS .exe + MSI). Heavy (Rust compile), so it builds
# on version tags (v*) or when started manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Use HTTPS for GitHub git dependencies
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      # WebView2 is preinstalled on windows-latest. bundle.targets="all" builds the
      # NSIS installer (.exe) and the MSI on Windows.
      - name: Build Windows installers
        run: npm run tauri:build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: trackbox-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
